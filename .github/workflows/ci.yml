name: CI/CD Pipeline
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  ACR_REGISTRY: crpi-he7mqvhihpnvi08o.cn-shanghai.personal.cr.aliyuncs.com
  ACR_NAMESPACE: cloud-native-shop

jobs:
  # ----------------------------------------------------
  # 阶段一：代码检查与测试 (Lint & Test)
  # ----------------------------------------------------
  lint-and-test:
    name: lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install -r services/${{ matrix.service }}/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run Code Lint
        working-directory: services/${{ matrix.service }}
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v

  # ----------------------------------------------------
  # 阶段二：构建镜像与推送 ACR (Build & Push)
  # ----------------------------------------------------
  build-and-push:
    name: build ${{ matrix.service }}
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: user-service
            dockerfile: deploy/docker/user-service.Dockerfile
          - service: product-service
            dockerfile: deploy/docker/product-service.Dockerfile
          - service: order-service
            dockerfile: deploy/docker/order-service.Dockerfile
          - service: frontend
            dockerfile: deploy/docker/frontend.Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------
  # 阶段三：更新 GitOps 仓库镜像 tag
  # ----------------------------------------------------
  update-gitops:
    name: update gitops
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 1. 克隆 GitOps 仓库
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: AmazingYe-oss/cloud-native-shop-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      # 2. 用 yq 更新各服务的镜像 tag（commit SHA 的短格式，前 7 位）
      - name: Update image tags
        working-directory: gitops
        run: |
          # 安装 yq（YAML 处理工具，类比 jq 之于 JSON）
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          VALUES_FILE=environments/dev/values.yaml

          # 逐个更新各服务的 tag
          yq -i ".services.frontend.tag = \"${SHORT_SHA}\"" "$VALUES_FILE"
          yq -i ".services.user-service.tag = \"${SHORT_SHA}\"" "$VALUES_FILE"
          yq -i ".services.product-service.tag = \"${SHORT_SHA}\"" "$VALUES_FILE"
          yq -i ".services.order-service.tag = \"${SHORT_SHA}\"" "$VALUES_FILE"

          echo "Updated tags to ${SHORT_SHA}"
          cat "$VALUES_FILE"

      # 3. 提交并推送（有变更才推，没变更跳过）
      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查是否有变更
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add .
          git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
