apiVersion: apps/v1  
kind: Deployment      
metadata:
  name: user-service  
  namespace: cloud-native-shop  
  labels:
    app: user-service  
spec:
  replicas: 1  
  selector:
    matchLabels:
      app: user-service  
  template:  
    metadata:
      labels:
        app: user-service  
    spec:  
      containers:  
      - name: user-service  
        image: cloud-native-shop-user-service:latest  
        imagePullPolicy: IfNotPresent
        env:
        - name: USER_SERVICE_URL
          value: "http://user-service:8000"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8000"
        ports:
        - containerPort: 8000  
        resources:  
          requests:
            cpu: "100m"        
            memory: "128Mi"    
          limits:
            cpu: "300m"        
            memory: "256Mi"    
        livenessProbe:  
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:  
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10